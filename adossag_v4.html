<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adósság kalkulátor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;min-height:100vh;
  background:#060606;
  font-family:-apple-system,system-ui,'Segoe UI',sans-serif;
  color:#fff;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
  transition:background 0.7s ease;
}
.pulse-ring{position:fixed;inset:0;pointer-events:none;border:4px solid transparent;transition:border-color 0.4s,opacity 0.3s;z-index:999;}
.shell{
  max-width:430px;margin:0 auto;
  padding:0.9rem 1rem 1rem;
  display:flex;flex-direction:column;
  min-height:100vh;
  transition:background 0.7s ease;
}

/* TOP: % + meter */
.top-section{margin-bottom:0.6rem;}
.zone-label{font-size:9px;letter-spacing:0.13em;text-transform:uppercase;color:#555;margin-bottom:0.1rem;}
.top-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:0.4rem;}
.big-num{font-size:52px;font-weight:700;line-height:1;transition:color 0.5s;}
.big-sub{font-size:11px;color:#555;line-height:1;}
.heart-inline{display:flex;align-items:center;gap:6px;padding-bottom:4px;}
.heart-svg{overflow:visible;flex-shrink:0;transition:fill 0.5s;}
.bpm-val{font-size:14px;font-weight:700;transition:color 0.5s;}

.meter-track{height:8px;border-radius:4px;background:#1c1c1c;margin-bottom:0.25rem;overflow:hidden;}
.meter-fill{height:100%;border-radius:4px;transition:width 0.3s ease,background 0.5s;}
.meter-labels{display:flex;justify-content:space-between;font-size:9px;color:#3a3a3a;margin-bottom:0.65rem;}

/* STATUS */
.status-row{
  border-radius:10px;padding:8px 12px;
  transition:background 0.6s,border-color 0.6s;
  border:1px solid transparent;
  margin-bottom:0.65rem;
  display:flex;align-items:center;gap:10px;
}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background 0.5s;}
.status-text{flex:1;}
.status-title{font-size:13px;font-weight:700;transition:color 0.5s;}
.status-desc{font-size:11px;color:#777;line-height:1.35;margin-top:1px;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:0.65rem;}
.info-card{border-radius:8px;padding:7px 8px;border:1px solid #1a1a1a;transition:background 0.6s,border-color 0.6s;}
.info-label{font-size:9px;color:#444;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:3px;line-height:1.2;}
.info-val{font-size:13px;font-weight:700;transition:color 0.5s;line-height:1.1;}

/* SLIDERS */
.sliders{display:flex;flex-direction:column;gap:7px;flex:1;}
.sl-row{
  border-radius:11px;padding:9px 12px;
  border:2px solid #222;
  transition:background 0.6s,border-color 0.4s,box-shadow 0.4s;
  -webkit-tap-highlight-color:transparent;
}
.sl-row.active-field{
  border-color:#1d9e75 !important;
  box-shadow:0 0 0 2px rgba(29,158,117,0.1);
}
.sl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sl-name-wrap{display:flex;align-items:center;gap:6px;}
.sl-dot{width:7px;height:7px;border-radius:50%;background:transparent;border:1.5px solid #444;transition:background 0.3s,border-color 0.3s;flex-shrink:0;}
.sl-row.active-field .sl-dot{background:#1d9e75;border-color:#1d9e75;}
.sl-name{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:#555;transition:color 0.3s;}
.sl-row.active-field .sl-name{color:#9fe1cb;}
.sl-right{display:flex;align-items:baseline;gap:3px;}
.sl-val{font-size:18px;font-weight:700;transition:color 0.5s;}
.sl-unit{font-size:10px;color:#555;}

input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:4px;border-radius:2px;
  outline:none;cursor:pointer;transition:background 0.5s;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:26px;height:26px;border-radius:50%;
  cursor:pointer;transition:background 0.5s;
  box-shadow:0 2px 6px rgba(0,0,0,0.7);
}
input[type=range]::-moz-range-thumb{
  width:26px;height:26px;border-radius:50%;border:none;
  cursor:pointer;transition:background 0.5s;
}
</style>
</head>
<body id="body">
<div class="pulse-ring" id="pring"></div>
<div class="shell" id="shell">

  <div class="top-section">
    <div class="zone-label">adósság / jövedelem arány</div>
    <div class="top-row">
      <div>
        <div class="big-num" id="bigNum">—</div>
        <div class="big-sub">havi törlesztő aránya</div>
      </div>
      <div class="heart-inline">
        <svg class="heart-svg" id="heartSvg" viewBox="0 0 22 20" width="20" height="18" fill="#e24b4a" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 18.5S1 12 1 5.5A5.5 5.5 0 0 1 11 3.2 5.5 5.5 0 0 1 21 5.5C21 12 11 18.5 11 18.5Z"/>
        </svg>
        <span class="bpm-val" id="bpmVal">—</span>
      </div>
    </div>
    <div class="meter-track"><div class="meter-fill" id="mfill" style="width:0%"></div></div>
    <div class="meter-labels"><span>0%</span><span>36% biztonságos</span><span>50% kritikus</span><span>100%</span></div>
  </div>

  <div class="status-row" id="statusRow">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text">
      <div class="status-title" id="statusTitle">—</div>
      <div class="status-desc" id="statusDesc">—</div>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-card" id="ic1"><div class="info-label">teljes adósság</div><div class="info-val" id="totalDebtVal">—</div></div>
    <div class="info-card" id="ic2"><div class="info-label">fedezettség</div><div class="info-val" id="coverageVal">—</div></div>
    <div class="info-card" id="ic3"><div class="info-label">szabad jöv.</div><div class="info-val" id="freeVal">—</div></div>
    <div class="info-card" id="ic4"><div class="info-label">adóssment.</div><div class="info-val" id="saveVal">—</div></div>
  </div>

  <div class="sliders">
    <div class="sl-row active-field" id="row-income" onclick="setActive('income')">
      <div class="sl-top">
        <div class="sl-name-wrap"><div class="sl-dot" id="dot-income"></div><span class="sl-name">havi bevétel</span></div>
        <div class="sl-right"><span class="sl-val" id="v-income">400 000</span><span class="sl-unit">Ft</span></div>
      </div>
      <input type="range" id="s-income" min="50000" max="3000000" step="10000" value="400000" oninput="render()">
    </div>
    <div class="sl-row" id="row-debt" onclick="setActive('debt')">
      <div class="sl-top">
        <div class="sl-name-wrap"><div class="sl-dot" id="dot-debt"></div><span class="sl-name">havi törlesztő</span></div>
        <div class="sl-right"><span class="sl-val" id="v-debt">80 000</span><span class="sl-unit">Ft</span></div>
      </div>
      <input type="range" id="s-debt" min="0" max="500000" step="5000" value="80000" oninput="render()">
    </div>
    <div class="sl-row" id="row-assets" onclick="setActive('assets')">
      <div class="sl-top">
        <div class="sl-name-wrap"><div class="sl-dot" id="dot-assets"></div><span class="sl-name">megtakarítás</span></div>
        <div class="sl-right"><span class="sl-val" id="v-assets">500 000</span><span class="sl-unit">Ft</span></div>
      </div>
      <input type="range" id="s-assets" min="0" max="10000000" step="25000" value="500000" oninput="render()">
    </div>
    <div class="sl-row" id="row-months" onclick="setActive('months')">
      <div class="sl-top">
        <div class="sl-name-wrap"><div class="sl-dot" id="dot-months"></div><span class="sl-name">hátralévő hónapok</span></div>
        <div class="sl-right"><span class="sl-val" id="v-months">36</span><span class="sl-unit">hó</span></div>
      </div>
      <input type="range" id="s-months" min="1" max="360" step="1" value="36" oninput="render()">
    </div>
  </div>

</div>
<script>
var ZONES=[
  {max:20, bg:'#061610',cardBg:'#0a1e14',border:'#1d9e75',fill:'#1d9e75',accent:'#9fe1cb',statusBg:'#0a2018',dot:'#1d9e75',bpm:60,
   title:'Kiváló pénzügyi egészség',desc:'Az adósságterhelés nagyon alacsony.'},
  {max:36, bg:'#131000',cardBg:'#1a1500',border:'#c47a10',fill:'#ef9f27',accent:'#fac775',statusBg:'#1a1500',dot:'#c47a10',bpm:82,
   title:'Biztonságos zóna',desc:'Az ajánlott határ alatt vagy.'},
  {max:50, bg:'#1a0900',cardBg:'#1e0e00',border:'#d85a30',fill:'#d85a30',accent:'#f0997b',statusBg:'#1e0e00',dot:'#d85a30',bpm:118,
   title:'Figyelmeztető zóna',desc:'Megközelíted a kritikus határt!'},
  {max:100,bg:'#160303',cardBg:'#200505',border:'#c03030',fill:'#e24b4a',accent:'#f09595',statusBg:'#200505',dot:'#e24b4a',bpm:160,
   title:'Veszélyes terhelés',desc:'Kritikus! Az adósság felőrli a mozgásteredet.'}
];

var FLDS=['income','debt','assets','months'];
var activeField='income';
var heartTmr=null,beating=false,lastZoneIdx=-1;

function gz(r){for(var i=0;i<ZONES.length;i++)if(r*100<=ZONES[i].max)return ZONES[i];return ZONES[3];}

function setActive(f){
  activeField=f;
  FLDS.forEach(function(x){
    var row=document.getElementById('row-'+x);
    if(x===f) row.classList.add('active-field');
    else row.classList.remove('active-field');
  });
}

function setThumbColor(color){
  var s=document.getElementById('_ts');
  if(!s){s=document.createElement('style');s.id='_ts';document.head.appendChild(s);}
  s.textContent='input[type=range]::-webkit-slider-thumb{background:'+color+' !important;}'
               +'input[type=range]::-moz-range-thumb{background:'+color+' !important;}';
}

function render(){
  var inc=+document.getElementById('s-income').value;
  var dbt=+document.getElementById('s-debt').value;
  var ast=+document.getElementById('s-assets').value;
  var mo =+document.getElementById('s-months').value;
  var ratio=inc>0?Math.min(dbt/inc,1):0;
  var pct=Math.round(ratio*100);
  var z=gz(ratio);
  var zi=ZONES.indexOf(z);
  var totalDebt=dbt*mo;
  var cov=totalDebt>0?ast/totalDebt:99;
  var free=inc-dbt;
  var saveMo=free>0&&totalDebt>0?Math.ceil(totalDebt/free):0;

  document.getElementById('body').style.background=z.bg;
  document.getElementById('shell').style.background=z.bg;
  document.getElementById('pring').style.borderColor=z.border;
  document.getElementById('bigNum').textContent=pct+'%';
  document.getElementById('bigNum').style.color=z.accent;
  document.getElementById('mfill').style.width=pct+'%';
  document.getElementById('mfill').style.background=z.fill;

  document.getElementById('statusDot').style.background=z.dot;
  document.getElementById('statusTitle').textContent=z.title;
  document.getElementById('statusTitle').style.color=z.accent;
  document.getElementById('statusDesc').textContent=z.desc;
  document.getElementById('statusRow').style.background=z.statusBg;
  document.getElementById('statusRow').style.borderColor=z.border+'70';

  FLDS.forEach(function(f){
    var v=+document.getElementById('s-'+f).value;
    document.getElementById('v-'+f).textContent=f==='months'?Math.round(v):Math.round(v).toLocaleString('hu-HU');
    document.getElementById('v-'+f).style.color=z.accent;
    document.getElementById('row-'+f).style.background=z.cardBg;
    if(f!==activeField) document.getElementById('row-'+f).style.borderColor=z.border+'45';
    else document.getElementById('row-'+f).style.borderColor='';
    document.getElementById('s-'+f).style.background=z.border+'35';
  });
  setThumbColor(z.accent);

  for(var j=1;j<=4;j++){
    document.getElementById('ic'+j).style.background=z.cardBg;
    document.getElementById('ic'+j).style.borderColor=z.border+'35';
  }
  document.getElementById('totalDebtVal').textContent=totalDebt>0?Math.round(totalDebt/1000)+' e Ft':'—';
  document.getElementById('totalDebtVal').style.color=z.accent;
  var covColor=cov>=1?'#1d9e75':cov>=0.5?'#ef9f27':'#e24b4a';
  document.getElementById('coverageVal').textContent=totalDebt>0?Math.min(Math.round(cov*100),999)+'%':'—';
  document.getElementById('coverageVal').style.color=covColor;
  var freeK=Math.abs(free)>=1000?Math.round(free/1000)+' e':'Math.round(free)';
  document.getElementById('freeVal').textContent=Math.round(free/1000)+' e Ft';
  document.getElementById('freeVal').style.color=free>=0?z.accent:'#e24b4a';
  document.getElementById('saveVal').textContent=saveMo>0?saveMo+' hó':'—';
  document.getElementById('saveVal').style.color=z.accent;

  if(zi!==lastZoneIdx){
    if(navigator.vibrate){
      if(zi===0)navigator.vibrate([30]);
      else if(zi===1)navigator.vibrate([40,30,40]);
      else if(zi===2)navigator.vibrate([60,40,60,40,60]);
      else navigator.vibrate([80,30,80,30,80,30,150]);
    }
    lastZoneIdx=zi;
  }
  updateHeart(z.bpm,ratio,z.accent);
}

function updateHeart(bpm,ratio,color){
  if(heartTmr){clearInterval(heartTmr);heartTmr=null;}
  document.getElementById('bpmVal').textContent=bpm+' bpm';
  document.getElementById('bpmVal').style.color=color;
  document.getElementById('heartSvg').style.fill=color;
  var ivl=Math.round(60000/bpm);
  var heart=document.getElementById('heartSvg');
  var pring=document.getElementById('pring');
  heartTmr=setInterval(function(){
    if(beating)return;
    beating=true;
    var sc=1+(ratio>0.5?0.6:ratio>0.36?0.32:0.15);
    heart.style.transition='transform 0.07s ease-out';
    heart.style.transform='scale('+sc+')';
    heart.style.transformOrigin='center';
    if(ratio>0.36){
      pring.style.transition='opacity 0.06s';
      pring.style.opacity='1';
      setTimeout(function(){pring.style.opacity='0.08';pring.style.transition='opacity 0.5s';},90);
      setTimeout(function(){pring.style.opacity='1';},600);
    }
    if(ratio>0.5&&navigator.vibrate)navigator.vibrate(ratio>0.75?[12,6,12]:8);
    if(ratio>0.5){
      setTimeout(function(){
        heart.style.transition='transform 0.06s ease-out';
        heart.style.transform='scale('+(sc*0.8)+')';
        setTimeout(function(){heart.style.transition='transform 0.06s ease-out';heart.style.transform='scale('+sc+')';},65);
      },105);
    }
    setTimeout(function(){
      heart.style.transform='scale(1)';
      heart.style.transition='transform 0.28s ease-in';
      beating=false;
    },ratio>0.5?270:140);
  },ivl);
}

setActive('income');
render();
</script>
</body>
</html>
